# Tier-3 — systemd drop-in for the umbrella unit, agent-exec environment.
#
# Install to: /etc/systemd/system/umbrella.service.d/agent.conf
#   $ sudo install -d /etc/systemd/system/umbrella.service.d
#   $ sudo install -m 0644 -o root -g root \
#         deploy/tier3/umbrella-agent.conf /etc/systemd/system/umbrella.service.d/agent.conf
#   $ sudo systemctl daemon-reload && sudo systemctl restart umbrella
#
# These add the Environment keys agent-bridge.ts reads. Verify after reload with:
#   $ systemctl show umbrella -p Environment
#
# NOTE on HOME: in sudo drop-mode the agent's HOME comes from `sudo -H` (agent's passwd
# entry = /opt/umbrella/agent-home). AGENT_HOME below is set for parity/clarity; the
# authoritative source of the ~/.claude session is the passwd HOME, which the provision
# script sets to the same path.

[Service]
# --- Agent identity & invocation (agent-bridge.ts buildInvocation) -------------------
Environment=AGENT_USER=agent
# AGENT_CLI_PATH MUST be absolute (code rejects a relative cli when AGENT_USER is set)
# and points at the wrapper, NOT the raw claude binary (so the G6 cgroup scope + ulimits
# and the G4 proxy env attach).
Environment=AGENT_CLI_PATH=/opt/umbrella/deploy/agent-exec-wrapper.sh
Environment=AGENT_SUDO_PATH=/usr/bin/sudo
# AGENT_HOME = the agent user's ACTUAL passwd home (the pre-existing `agent` user uses
# /home/agent, where `claude auth login` stored the Max-plan session, 0700). In drop mode
# `sudo -H` derives HOME from passwd anyway, so this is informational/parity; keep it
# consistent with reality so direct-mode/tests resolve the same session.
Environment=AGENT_HOME=/home/agent
# Pinned PATH for the agent child (no PATH-based binary hijack). Includes /usr/local/bin
# where claude is installed.
Environment=AGENT_PATH=/usr/local/bin:/usr/bin:/bin
# Per-agent wall-clock timeout (ms) → SIGTERM/SIGKILL of the process group. 25 min,
# just under the wrapper's 1500s CPU ulimit so wall-clock fires first on a hung child.
Environment=AGENT_TIMEOUT_MS=1500000

# --- Live execution ------------------------------------------------------------------
# HARNESS_LIVE=1 makes the daemon run real harness.sh subcommands (not the dry-run
# fixture). Required for an agent build to actually create worktrees/merge.
Environment=HARNESS_LIVE=1

# --- G4 egress proxy (NOTE: NOT set here on purpose) ---------------------------------
# HTTPS_PROXY/HTTP_PROXY/NO_PROXY for the agent are set INSIDE agent-exec-wrapper.sh, NOT
# as unit Environment. Reason: sudo runs with env_reset (sudoers fragment), so the
# daemon's unit environment is DROPPED before the agent child starts — unit-level
# HTTPS_PROXY would never reach claude. The wrapper runs as the agent and exports them
# itself, which is the only path that actually takes effect. (Documented per council 2B.)

# --- Cutover-only flags (LEAVE COMMENTED until §Cutover in RUNBOOK.md) ----------------
# Flip these ONLY at cutover, as a deliberate, signed-off operator step — NOT now.
# Uncomment, then `systemctl daemon-reload && systemctl restart umbrella`.
#
# ENABLE_AGENT_EXEC=1 lets spawnAgent actually spawn the agent (default: refused).
#Environment=ENABLE_AGENT_EXEC=1
#
# ENABLE_PROMOTE_TO_MAIN=1 lets harness.sh promote run (agent-built code → main).
# Keep OFF until you have watched a full lane and reviewed the diff (G8).
#Environment=ENABLE_PROMOTE_TO_MAIN=1

# ponytail: env-in-unit is the simplest secret-free config surface. Ceiling: these are
# world-readable via `systemctl show` (no secrets here, so acceptable). Upgrade path: if
# any secret ever needs to be here, move to EnvironmentFile= with 0600 perms.
#
# skipped: NODE_OPTIONS/heap tuning for the daemon, add only if the daemon itself OOMs.
