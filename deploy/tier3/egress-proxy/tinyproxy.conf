# Tier-3 / G4 — tinyproxy: FQDN-allowlisting forward proxy for the agent's egress.
#
# Trust model: THIS PROXY is the egress allowlist. It accepts CONNECT only to the
# Anthropic API hostnames on :443 and denies everything else. The agent is pointed here
# via HTTPS_PROXY (set in the wrapper). agent-egress.nft is the BACKSTOP: it drops any
# direct agent egress so the agent cannot bypass the proxy. Neither alone is sufficient —
# the proxy enforces the FQDN policy; nft enforces that the proxy is the only path out.
#
# tinyproxy chosen over squid: far smaller, single config, native CONNECT + a deny-by-
# default Filter on hostnames is exactly what we need (no caching/ACL machinery).
#
# Install: deploy/tier3/egress-proxy/tinyproxy.conf → /etc/tinyproxy/agent-proxy.conf
#          deploy/tier3/egress-proxy/anthropic-allow.filter → /etc/tinyproxy/anthropic-allow.filter
#   DRAFT FOR REVIEW — do NOT run until sign-off (see RUNBOOK.md).

User  tinyproxy-agent          # own low-priv user (created in RUNBOOK Step 4)
Group tinyproxy-agent

# Bind to LOOPBACK ONLY — never reachable off-box. The agent connects to 127.0.0.1:3128.
Listen 127.0.0.1
Port 3128
# Hard-bind the upstream-facing source too; refuse anything not from loopback.
Allow 127.0.0.1

Timeout 600
MaxClients 20
# No disclosing headers; strip Via so the proxy is not announced upstream.
DisableViaHeader Yes

# CONNECT (HTTPS tunnel) — restrict to 443 only. No plaintext 80 CONNECT, no other ports.
ConnectPort 443

# --- FQDN allowlist (deny by default) ------------------------------------------------
# Filter matches the CONNECT host. FilterDefaultDeny = everything not listed is REJECTED.
# FilterExtended uses POSIX-extended regex; the .filter file pins the exact hostnames.
Filter "/etc/tinyproxy/anthropic-allow.filter"
FilterDefaultDeny Yes
FilterExtended Yes
FilterCaseSensitive No
# Filter the CONNECT destination host (the tunnel target), not just URLs.
FilterURLs Off

# Logs: connection attempts (allow/deny) are useful for G4/G7 forensics. No payload is
# logged (HTTPS is opaque to the proxy — it only sees the CONNECT host, which is the point).
LogLevel Connect
LogFile "/var/log/tinyproxy/agent-proxy.log"

# ponytail: tinyproxy filters on the CONNECT hostname the client sends — it does NOT do
# TLS SNI/cert validation, so a client that lies about the host (CONNECT good-host but
# SNI elsewhere) is only stopped because nft pins egress to THIS proxy and the proxy then
# dials the (real) allowlisted host by name. Ceiling: no MITM/cert inspection. Upgrade
# path: an SNI-aware proxy (e.g. an Envoy/squid with ssl_bump peek+splice on SNI) if you
# need to bind the allowlist to the TLS SNI rather than the CONNECT host line.
#
# skipped: upstream cert pinning, add if Anthropic publishes a pinned chain.
