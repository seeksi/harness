# Tier-3 / G4 — tinyproxy: FQDN-allowlisting forward proxy for the agent's egress.
#
# Trust model: THIS PROXY is the egress allowlist. It accepts CONNECT only to the
# Anthropic API hostnames on :443 and denies everything else. The agent is pointed here
# via HTTPS_PROXY (set in the wrapper). agent-egress.nft is the BACKSTOP: it drops any
# direct agent egress so the agent cannot bypass the proxy. Neither alone is sufficient.
#
# SYNTAX NOTE (tinyproxy 1.11): directives take NO inline comments — a trailing "# ..."
# on a directive line is a parse error ("Syntax error on line N"). Keep comments on their
# own lines.
#
# DISTRO CONFINEMENT: Ubuntu's AppArmor profile for /usr/bin/tinyproxy only allows the
# DEFAULT config/log paths. The custom paths below require the local override
# `apparmor-local-tinyproxy` installed to /etc/apparmor.d/local/tinyproxy (RUNBOOK 4a).
#
# Install: this file -> /etc/tinyproxy/agent-proxy.conf ; anthropic-allow.filter ->
#          /etc/tinyproxy/anthropic-allow.filter

# Own low-priv user (created in RUNBOOK Step 4).
User  tinyproxy-agent
Group tinyproxy-agent

# Bind to LOOPBACK ONLY — never reachable off-box. The agent connects to 127.0.0.1:3128.
Listen 127.0.0.1
Port 3128
# Refuse anything not from loopback.
Allow 127.0.0.1

Timeout 600
MaxClients 20

# No disclosing headers; strip Via so the proxy is not announced upstream.
DisableViaHeader Yes

# CONNECT (HTTPS tunnel) — restrict to 443 only. No plaintext 80 CONNECT, no other ports.
ConnectPort 443

# --- FQDN allowlist (deny by default) ------------------------------------------------
# Filter matches the CONNECT host. FilterDefaultDeny = everything not listed is REJECTED.
Filter "/etc/tinyproxy/anthropic-allow.filter"
FilterDefaultDeny Yes
FilterExtended Yes
FilterCaseSensitive No
# Filter the CONNECT destination host (the tunnel target), not just URLs.
FilterURLs Off

# Logs: connection attempts (allow/deny) for G4/G7 forensics. HTTPS payload is opaque to
# the proxy — it only sees the CONNECT host, which is the point.
LogLevel Connect
LogFile "/var/log/tinyproxy/agent-proxy.log"

# ponytail: tinyproxy filters on the CONNECT hostname the client sends — it does NOT do
# TLS SNI/cert validation. nft pins egress to THIS proxy so a lying client still can't
# dial elsewhere directly. Upgrade path: an SNI-aware proxy (Envoy/squid ssl_bump
# peek+splice) to bind the allowlist to the TLS SNI rather than the CONNECT host line.
